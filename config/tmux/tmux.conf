# : << 'EOF'

setenv -g PATH "$HOME/.bin:$PATH"

run '~/.config/tmux/session-manager.sh restore'
set-hook -g window-layout-changed 'run -b "~/.config/tmux/session-manager.sh save"' # Append a hook because we have one for pane border already
set-hook -g window-layout-changed 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g session-window-changed 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g session-created 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g client-detached 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g window-renamed 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g after-split-window 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g after-new-window 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g pane-exited 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g session-renamed 'run -b "~/.config/tmux/session-manager.sh save"'
set-hook -g session-closed 'run -b "~/.config/tmux/session-manager.sh save"'

if -F "#{==:#{window_panes},1}" "set pane-border-status off" "set pane-border-status top"
set-hook -ga window-layout-changed 'if -F "#{==:#{window_panes},1}" "set pane-border-status off" "set pane-border-status top"'

set -g status-interval 3
set -g focus-events on

# Status bar — transparent background, inherits terminal colors
set -g status-style "fg=default,bg=default"
set -g status-justify left
set -g status-left-length 100
set -g status-right-length 100

# Left: prefix indicator + session name
set -g status-left "#[bold]#{?client_prefix,,N} #S #[nobold]"

# Window tabs
set -g window-status-format "#I:#{b:pane_current_path} "
set -g window-status-current-format "#[fg=green,bold]#I:#{b:pane_current_path} #[fg=default,nobold]"
set -g window-status-separator ""
set -g window-status-activity-style "bold,underscore"
set -g window-status-bell-style "bold,underscore"

# Pane borders — ANSI green adapts to terminal's own green
set -g pane-border-style "fg=default,dim"
set -g pane-active-border-style "fg=green"
set -g pane-border-lines single
set -g pane-border-format "#{?pane_active,#[reverse],#[dim]} #{pane_index}:#{pane_current_command}#{?window_zoomed_flag, 󰊓,} #[noreverse,nodim]"

# Messages
set -g message-style "fg=green,bg=default,bold"
set -g message-command-style "fg=green,bg=default,bold"

# Copy/search mode
set -g mode-style "fg=default,bg=default,reverse,dim"
set -g copy-mode-match-style "fg=default,bg=default,underscore,dim"
set -g copy-mode-current-match-style "fg=default,bg=default,reverse,dim"

# Clock
set -g clock-mode-style 24

# Display pane numbers
set -g display-panes-active-colour green
set -g display-panes-colour default

# Right: git branch in repo
set -g status-right "#(cd #{pane_current_path} && git rev-parse --is-inside-work-tree >/dev/null 2>&1 && echo \" \$(git branch --show-current) \" || echo \"\")"

# Undercurl and sixel
set -g default-terminal "${TERM}"
set -g allow-passthrough on
set -as terminal-features ',*:sixel'
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0


set -g renumber-windows on
set -s escape-time 0
set -g history-limit 100000
set -g mode-keys vi

set -g set-titles on
set -g set-titles-string '#S'
set -g display-time 1000

set -g base-index 1
setw -g pane-base-index 1

bind C-b send-prefix

bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Navigate between panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-\\ select-pane -l -Z
bind -n M-F resize-pane -Z

bind -n M-| switch-client -l
bind -n M-p switch-client -p
bind -n M-n switch-client -n
bind -n M-Tab select-window -t :+
bind -n M-BTab select-window -t :-

bind -n M-K resize-pane -U
bind -n M-J resize-pane -D
bind -n M-H resize-pane -L
bind -n M-L resize-pane -R

bind C-l clear-history
bind C-s run "~/.config/tmux/session-manager.sh save" \; display "Session saved"
bind C-r run "~/.config/tmux/session-manager.sh restore" \; display "Session restored"

# Alt-<n> to switch to window <n>
run "for idx in $(seq 1 9); do tmux bind -n M-\$idx select-pane -t \$idx; done"
# Ctr-b <n> to switch to pane <n>
run "for idx in $(seq 1 9); do tmux bind -T prefix \$idx select-window -t \$idx; done"

bind e run "cut -c3- ~/.config/tmux/tmux.conf | sh -s edit_tmux_output"
bind s run "cut -c3- ~/.config/tmux/tmux.conf | zsh -s choose_tmux_pane"

# Clipboard
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

bind b last-window
bind R source ~/.config/tmux/tmux.conf
bind ! confirm-before -p "kill-server? (y/n)" kill-server

bind -T root F12 {
  set prefix None
  set key-table off
  set -g status off
  if -F '#{pane_in_mode}' 'send-keys -X cancel'
  refresh-client -S
}

bind -T off F12 {
  set -u prefix
  set -u key-table
  set -g status on
  refresh-client -S
}

